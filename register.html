     <div class="register-content" data-aos="zoom-in"> 
       <welcome>
         <h1>Register for Hybrid Fitness</h1>
         <p>Join us today and start your fitness journey with us!</p>
        <div class="register-form">
          <fieldset class="field">
            <legend>Registration</legend>
             <br><br>
            <div class="inputbox">
            <label for="firstname">Firstname</label>
             <input type="text" id="firstname" required
             placeholder="Firstname" /><br><br>
             </div>

             <div class="inputbox">
             <label for="surname">Surname</label>
              <input type="text" id="surname" required 
             placeholder="Surname" /><br><br>
              </div>


              <div class="inputbox">
             <label for="email">Email</label>
             <input type="email" id="email" required
             placeholder="Email Address"/><br><br>
             </div>

              <div class="inputbox">
             <label for="cellno">Cell Number:</label>
              <input type ="tel" id="cellno" required 
              placeholder="71000000"/><br><br>
              </div>

              <button type="submit" class="btn btn-primary">Submit</button>

           </fieldset>

         </div>
    </div>

         <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
         <script>
          AOS.init({
             offset: 300,
              duration: 1400,
